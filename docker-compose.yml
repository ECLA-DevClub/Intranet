services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./intranet_backend
      dockerfile: Dockerfile
    volumes:
      - ./intranet_backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@db:5432/postgres}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-secret-key-12345}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./intranet-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v2
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_static:
  backend_media:
