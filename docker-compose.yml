services:
  backend:
    build:
      context: ./intranet_backend
      dockerfile: Dockerfile
    volumes:
      - ./intranet_backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
      - backend_logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://postgres.mdjdodwzleuqnwdlpvuz:intranetdevclubengineering2026@aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-intranet_backend.settings.dev}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}

  frontend:
    build:
      context: ./intranet-frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v2
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - backend_static:/app/static:ro
      - backend_media:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  backend_static:
  backend_media:
  backend_logs:
