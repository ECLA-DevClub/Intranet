openapi: 3.0.3
info:
  title: Intranet Platform API
  version: 1.0.0
  description: REST API for the Intranet Platform — authentication, departments, employees,
    tickets, documents, and audit logs.
paths:
  /admin/api/main/documents/:
    get:
      operationId: admin_api_main_documents_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/documents/{id}/:
    get:
      operationId: admin_api_main_documents_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/documents/find/:
    get:
      operationId: admin_api_main_documents_find_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/images/:
    get:
      operationId: admin_api_main_images_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/images/{id}/:
    get:
      operationId: admin_api_main_images_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/images/find/:
    get:
      operationId: admin_api_main_images_find_retrieve
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/pages/:
    get:
      operationId: admin_api_main_pages_retrieve
      tags:
      - admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/pages/{id}/:
    get:
      operationId: admin_api_main_pages_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/pages/{id}/action/{action_name}/:
    post:
      operationId: admin_api_main_pages_action_create
      parameters:
      - in: path
        name: action_name
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /admin/api/main/pages/find/:
    get:
      operationId: admin_api_main_pages_find_retrieve
      tags:
      - admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/audit/:
    get:
      operationId: audit_list
      description: |-
        **Access:** Admin only.

        List all audit log entries. Logs are automatically created for ticket/document CRUD, status changes, assignments, and version uploads.
      tags:
      - Audit Logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/audit/{id}/:
    get:
      operationId: audit_retrieve
      description: |-
        **Access:** Admin only.

        Retrieve a single audit log entry.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this audit log.
        required: true
      tags:
      - Audit Logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        **Access:** Public (no authentication required).

        Obtain JWT access and refresh tokens by providing username and password.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: |-
        **Access:** Any authenticated user (own profile only).

        Retrieve or update the currently authenticated user's profile.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_profile_update
      description: |-
        **Access:** Any authenticated user (own profile only).

        Retrieve or update the currently authenticated user's profile.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      description: |-
        **Access:** Any authenticated user (own profile only).

        Retrieve or update the currently authenticated user's profile.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        **Access:** Public (no authentication required).

        Refresh an expired access token using a valid refresh token.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        **Access:** Admin only.

        Create a new user with a specific role.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/users/:
    get:
      operationId: auth_users_list
      description: |-
        **Access:** Admin only.

        List all registered users.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/departments/:
    get:
      operationId: departments_list
      description: |-
        **Access:** Any authenticated user.

        List all departments.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Departments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
          description: ''
    post:
      operationId: departments_create
      description: |-
        **Access:** Admin or Manager.

        Create a new department.
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
  /api/departments/{id}/:
    get:
      operationId: departments_retrieve
      description: |-
        **Access:** Any authenticated user.

        Retrieve department details.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - Departments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    put:
      operationId: departments_update
      description: |-
        **Access:** Admin or Manager.

        Fully update a department.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    patch:
      operationId: departments_partial_update
      description: |-
        **Access:** Admin or Manager.

        Partially update a department.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDepartmentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    delete:
      operationId: departments_destroy
      description: |-
        **Access:** Admin or Manager.

        Delete a department.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Department.
        required: true
      tags:
      - Departments
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/documents/:
    get:
      operationId: documents_list
      description: |-
        **Access:** Department-scoped (Admin sees all).

        List documents.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Documents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
          description: ''
    post:
      operationId: documents_create
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Upload a new document (FormData: title, department, file).
      tags:
      - Documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
  /api/documents/{id}/:
    get:
      operationId: documents_retrieve
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Retrieve document details.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Documents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
    put:
      operationId: documents_update
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Fully update a document (title only, not file).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
    patch:
      operationId: documents_partial_update
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Partially update a document (title only).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDocumentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDocumentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDocumentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
    delete:
      operationId: documents_destroy
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Delete a document with all its versions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Documents
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/documents/{id}/upload-version/:
    post:
      operationId: documents_upload_version_create
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Upload a new version of an existing document. Creates version current_version + 1.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadVersionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadVersionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadVersionRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
          description: ''
  /api/documents/{id}/versions/:
    get:
      operationId: documents_versions_list
      description: |-
        **Access:** Department-scoped (Admin sees all).

        List all versions of a document.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Documents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentVersion'
          description: ''
  /api/employees/:
    get:
      operationId: employees_list
      description: |-
        **Access:** Any authenticated user.

        List all employees. Supports filtering by `?department=`.
      parameters:
      - in: query
        name: department
        schema:
          type: string
      tags:
      - Employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
          description: ''
    post:
      operationId: employees_create
      description: |-
        **Access:** Any authenticated user.

        Create an employee profile.
      tags:
      - Employees
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
  /api/employees/{id}/:
    get:
      operationId: employees_retrieve
      description: |-
        **Access:** Any authenticated user.

        Retrieve employee details.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this employee.
        required: true
      tags:
      - Employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    put:
      operationId: employees_update
      description: |-
        **Access:** Any authenticated user.

        Fully update an employee profile.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this employee.
        required: true
      tags:
      - Employees
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    patch:
      operationId: employees_partial_update
      description: |-
        **Access:** Any authenticated user.

        Partially update an employee profile.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this employee.
        required: true
      tags:
      - Employees
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    delete:
      operationId: employees_destroy
      description: |-
        **Access:** Any authenticated user.

        Delete an employee profile.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this employee.
        required: true
      tags:
      - Employees
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/tickets/:
    get:
      operationId: tickets_list
      description: |-
        **Access:** Department-scoped (Admin sees all).

        List tickets. Supports `?search=` and `?ordering=created_at`.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Tickets
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
          description: ''
    post:
      operationId: tickets_create
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Create a new ticket.
      tags:
      - Tickets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
  /api/tickets/{id}/:
    get:
      operationId: tickets_retrieve
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Retrieve ticket details.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Tickets
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
    put:
      operationId: tickets_update
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Fully update a ticket (except status and assignee).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Tickets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
          description: ''
    patch:
      operationId: tickets_partial_update
      description: |-
        **Access:** Department-scoped (Admin sees all).

        Partially update a ticket (except status and assignee).
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
