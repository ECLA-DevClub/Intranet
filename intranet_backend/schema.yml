          - $ref: '#/components/schemas/ActionEnum'
          readOnly: true
        object_type:
          type: string
          readOnly: true
        object_id:
          type: integer
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        metadata:
          readOnly: true
          nullable: true
      required:
      - action
      - id
      - metadata
      - object_id
      - object_type
      - timestamp
      - user
      - username
    CustomTokenObtainPairRequest:
      type: object
