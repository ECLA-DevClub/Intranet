components:
  schemas:
    ActionEnum:
      enum:
      - CREATE
      - UPDATE
      - DELETE
      - STATUS_CHANGE
      - ASSIGN
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `DELETE` - Delete
        * `STATUS_CHANGE` - Status Change
        * `ASSIGN` - Assign
    AssignTicketRequest:
      type: object
      description: Validates ticket assignment.
      properties:
        assignee:
          type: integer
      required:
      - assignee
    AuditLog:
      type: object
      properties:
        id:
          type: integer
